<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1f2937; color: #fff; padding: 24px; }
    button:focus, input:focus { outline: none; }
    label { display: block; font-size: 13px; color: #9ca3af; margin-bottom: 6px; }
    .section { margin-bottom: 20px; }
    .section:first-child { margin-top: 8px; }
    input[type="text"] { width: 100%; padding: 8px 12px; background: #374151; color: #fff; border: none; border-radius: 4px; font-size: 13px; }
    .panel-row { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #374151; }
    .panel-row:last-child { border-bottom: 0; }
    .name-row { display: flex; align-items: center; margin-bottom: 4px; }
    .name-row .label { font-size: 11px; color: #6b7280; white-space: nowrap; }
    .btn { padding: 6px 12px; background: #374151; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; outline: none; }
    .btn:hover { background: #4b5563; }
    .btn:disabled { opacity: 0.3; cursor: default; }
    .btn.active { background: #2563eb; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="section">
    <label>面板数量 (<span id="count">2</span>/6)</label>
    <button class="btn" id="addBtn">+</button>
  </div>

  <div class="section">
    <label>面板配置</label>
    <div id="urls"></div>
  </div>

  <div class="section">
    <label>布局方式</label>
    <div class="btn-row" id="layoutBtns"></div>
  </div>

  <script src="./settings.js"></script>
</body>
</html>
